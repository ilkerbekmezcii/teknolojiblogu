on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Dosyalari ozel repodan al
        env:
          TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p docs scripts
          BASE="https://api.github.com/repos/ilkerbekmezcii/teknolojiblogu-backend/contents"

          # Static dosyalar ve script
          for f in docs/index.html docs/styles.css scripts/generate-articles.mjs; do
            curl -sL -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "$BASE/$f" -o "$f"
          done

          # app.js: once canli siteden, yoksa ozel repodan
          curl -sL "https://ilkerbekmezcii.github.io/teknolojiblogu/app.js" -o docs/app.js
          if [ ! -s docs/app.js ]; then
            curl -sL -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.raw+json" \
              "$BASE/docs/app.js" -o docs/app.js
          fi

      - run: node scripts/generate-articles.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Yayinla
        id: deployment
        uses: actions/deploy-pages@v4
