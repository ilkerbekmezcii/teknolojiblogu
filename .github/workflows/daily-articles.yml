name: Günlük Makale Üretici

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4

      - name: 🔧 Node.js'i kontrol et
        run: node --version

      - name: 🤖 Makaleleri oluştur
        run: node scripts/generate-articles.mjs
        timeout-minutes: 3

      - name: 📦 Sayfaları yükle
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 Yayınla
        id: deployment
        uses: actions/deploy-pages@v4
