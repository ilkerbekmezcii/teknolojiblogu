name: Günlük Makale Üretici

on:
  schedule:
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - run: node --version

      - name: Uretici scripti al
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p scripts
          curl -sL -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/ilkerbekmezcii/teknolojiblogu-backend/contents/scripts/generate-articles.mjs" \
            -o scripts/generate-articles.mjs

      - name: Makaleleri olustur
        run: node scripts/generate-articles.mjs
        timeout-minutes: 3

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Yayinla
        id: deployment
        uses: actions/deploy-pages@v4
