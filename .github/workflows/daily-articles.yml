name: Günlük Makale Üretici

on:
  schedule:
    # Her gün 06:00, 12:00 ve 18:00 UTC'de çalışır (günde 3 kez)
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:
    # Manuel çalıştırma için

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-articles:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Repoyu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Node.js'i kontrol et
        run: node --version

      - name: 🤖 Makaleleri oluştur
        run: node scripts/generate-articles.mjs
        timeout-minutes: 3

      - name: 📄 Değişiklikleri kontrol et
        id: check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📝 Değişiklik var:"
            git diff --stat
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ Değişiklik yok"
          fi

      - name: 📤 Değişiklikleri push'la
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "Teknoloji Blogu Bot"
          git config user.email "ilkerbekmezcii@users.noreply.github.com"
          git add -A
          git commit -m "🤖 Günlük makale güncellemesi $(date +'%Y-%m-%d')"
          git push
